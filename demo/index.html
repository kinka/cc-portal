<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Agent 协作演示</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }
    .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
    header {
      text-align: center;
      padding: 30px 0;
      border-bottom: 1px solid #334155;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .subtitle { color: #94a3b8; font-size: 0.95rem; }
    .config-bar {
      background: #1e293b;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 20px;
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    .config-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .config-item label {
      font-size: 0.875rem;
      color: #94a3b8;
    }
    .config-item input {
      background: #0f172a;
      border: 1px solid #334155;
      color: #e2e8f0;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.875rem;
      width: 180px;
    }
    .config-item input:focus {
      outline: none;
      border-color: #60a5fa;
    }
    .dashboard {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 20px;
    }
    .agent-card {
      background: #1e293b;
      border-radius: 12px;
      padding: 20px;
      border: 1px solid #334155;
      transition: all 0.3s ease;
    }
    .agent-card:hover { border-color: #60a5fa; }
    .agent-card.running { border-color: #22c55e; box-shadow: 0 0 15px rgba(34, 197, 94, 0.15); }
    .agent-card.error { border-color: #ef4444; box-shadow: 0 0 15px rgba(239, 68, 68, 0.15); }
    .agent-card.completed { border-color: #3b82f6; }
    .agent-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .agent-avatar {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .agent-1 { background: linear-gradient(135deg, #f472b6, #db2777); }
    .agent-2 { background: linear-gradient(135deg, #60a5fa, #2563eb); }
    .agent-3 { background: linear-gradient(135deg, #a78bfa, #7c3aed); }
    .agent-info h3 { font-size: 1rem; margin-bottom: 2px; }
    .agent-role { font-size: 0.8rem; color: #94a3b8; }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 16px;
      font-size: 0.8rem;
      margin-bottom: 12px;
    }
    .status-idle { background: rgba(148, 163, 184, 0.2); color: #94a3b8; }
    .status-running { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
    .status-error { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
    .status-completed { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
    .pulse { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .agent-task {
      background: #0f172a;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 12px;
      font-size: 0.85rem;
      color: #cbd5e1;
      min-height: 40px;
    }
    .agent-response {
      background: #0f172a;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 12px;
      font-size: 0.8rem;
      color: #94a3b8;
      max-height: 150px;
      overflow-y: auto;
      border-left: 3px solid #60a5fa;
    }
    .progress-bar {
      height: 6px;
      background: #334155;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .progress-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.5s ease;
    }
    .agent-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      font-size: 0.75rem;
      color: #64748b;
    }
    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-primary { background: linear-gradient(135deg, #60a5fa, #3b82f6); color: white; }
    .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 16px rgba(59, 130, 246, 0.3); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-secondary { background: #334155; color: #e2e8f0; }
    .btn-secondary:hover { background: #475569; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-danger:hover { background: #dc2626; }
    .log-panel {
      background: #1e293b;
      border-radius: 12px;
      border: 1px solid #334155;
      overflow: hidden;
    }
    .log-header {
      padding: 16px 20px;
      border-bottom: 1px solid #334155;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .log-list {
      max-height: 300px;
      overflow-y: auto;
      padding: 16px;
      font-family: 'Monaco', 'Consolas', monospace;
      font-size: 0.8rem;
    }
    .log-entry {
      padding: 6px 0;
      border-bottom: 1px solid #334155;
      color: #94a3b8;
    }
    .log-entry:last-child { border-bottom: none; }
    .log-time { color: #64748b; margin-right: 8px; }
    .log-info { color: #60a5fa; }
    .log-success { color: #22c55e; }
    .log-error { color: #ef4444; }
    .log-warn { color: #f59e0b; }
    .workflow-panel {
      background: #1e293b;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid #334155;
    }
    .workflow-title {
      font-size: 0.9rem;
      color: #94a3b8;
      margin-bottom: 16px;
    }
    .workflow-steps {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .workflow-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .step-box {
      width: 80px;
      height: 80px;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      font-size: 0.8rem;
      border: 2px solid #334155;
      transition: all 0.3s ease;
    }
    .step-box.active {
      border-color: #22c55e;
      box-shadow: 0 0 15px rgba(34, 197, 94, 0.3);
    }
    .step-box.completed {
      border-color: #3b82f6;
      background: rgba(59, 130, 246, 0.1);
    }
    .step-avatar {
      font-size: 24px;
    }
    .step-name {
      font-size: 0.75rem;
      color: #94a3b8;
    }
    .workflow-arrow {
      font-size: 24px;
      color: #475569;
    }
    .workflow-arrow.active {
      color: #22c55e;
    }
    .step-output {
      font-size: 0.7rem;
      color: #64748b;
      max-width: 80px;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    @media (max-width: 1024px) {
      .dashboard { grid-template-columns: 1fr; }
      .config-bar { flex-direction: column; align-items: stretch; }
      .config-item input { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🤖 Multi-Agent 协作演示</h1>
      <p class="subtitle">基于 Claude Agent HTTP Service 的多智能体协作开发</p>
    </header>

    <div class="workflow-panel">
      <div class="workflow-title">📋 协作流程 (上下文传递)</div>
      <div class="workflow-steps">
        <div class="workflow-step">
          <div class="step-box" id="step1">
            <div class="step-avatar">🏗️</div>
            <div class="step-name">架构师</div>
          </div>
          <div class="step-output" id="output1">等待开始</div>
        </div>
        <div class="workflow-arrow" id="arrow1">→</div>
        <div class="workflow-step">
          <div class="step-box" id="step2">
            <div class="step-avatar">💻</div>
            <div class="step-name">实现者</div>
          </div>
          <div class="step-output" id="output2">等待输入</div>
        </div>
        <div class="workflow-arrow" id="arrow2">→</div>
        <div class="workflow-step">
          <div class="step-box" id="step3">
            <div class="step-avatar">🧪</div>
            <div class="step-name">测试者</div>
          </div>
          <div class="step-output" id="output3">等待输入</div>
        </div>
      </div>
    </div>

    <div class="config-bar">
      <div class="config-item">
        <label>API 地址:</label>
        <input type="text" id="apiUrl" value="http://localhost:3456" placeholder="http://localhost:3456">
      </div>
      <div class="config-item">
        <label>工作目录:</label>
        <input type="text" id="workDir" value="/tmp/multi-agent-demo" placeholder="/tmp/multi-agent-demo">
      </div>
      <div class="config-item">
        <label>状态:</label>
        <span id="connectionStatus" style="color: #94a3b8;">未连接</span>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-primary" id="btnCreate" onclick="createAgents()">
        <span>🚀</span> 创建 3 个 Agents
      </button>
      <button class="btn btn-primary" id="btnStart" onclick="startCollaboration()" disabled>
        <span>▶️</span> 开始协作
      </button>
      <button class="btn btn-secondary" onclick="fetchSessions()">
        <span>🔄</span> 刷新状态
      </button>
      <button class="btn btn-danger" onclick="clearAll()">
        <span>🗑️</span> 清空所有
      </button>
    </div>

    <div class="dashboard">
      <div class="agent-card" id="agent1">
        <div class="agent-header">
          <div class="agent-avatar agent-1">🏗️</div>
          <div class="agent-info">
            <h3>Agent 1</h3>
            <div class="agent-role">架构师</div>
          </div>
        </div>
        <div class="status-badge status-idle" id="status1">
          <span>●</span> 未创建
        </div>
        <div class="agent-task" id="task1">点击「创建 3 个 Agents」开始</div>
        <div class="agent-response" id="response1" style="display: none;"></div>
        <div class="progress-bar">
          <div class="progress-fill agent-1" id="progress1" style="width: 0%; background: linear-gradient(90deg, #f472b6, #db2777);"></div>
        </div>
        <div class="agent-stats">
          <div>Session: <span id="session1">-</span></div>
          <div>耗时: <span id="time1">-</span></div>
        </div>
      </div>

      <div class="agent-card" id="agent2">
        <div class="agent-header">
          <div class="agent-avatar agent-2">💻</div>
          <div class="agent-info">
            <h3>Agent 2</h3>
            <div class="agent-role">实现者</div>
          </div>
        </div>
        <div class="status-badge status-idle" id="status2">
          <span>●</span> 未创建
        </div>
        <div class="agent-task" id="task2">等待创建...</div>
        <div class="agent-response" id="response2" style="display: none;"></div>
        <div class="progress-bar">
          <div class="progress-fill agent-2" id="progress2" style="width: 0%; background: linear-gradient(90deg, #60a5fa, #2563eb);"></div>
        </div>
        <div class="agent-stats">
          <div>Session: <span id="session2">-</span></div>
          <div>耗时: <span id="time2">-</span></div>
        </div>
      </div>

      <div class="agent-card" id="agent3">
        <div class="agent-header">
          <div class="agent-avatar agent-3">🧪</div>
          <div class="agent-info">
            <h3>Agent 3</h3>
            <div class="agent-role">测试者</div>
          </div>
        </div>
        <div class="status-badge status-idle" id="status3">
          <span>●</span> 未创建
        </div>
        <div class="agent-task" id="task3">等待创建...</div>
        <div class="agent-response" id="response3" style="display: none;"></div>
        <div class="progress-bar">
          <div class="progress-fill agent-3" id="progress3" style="width: 0%; background: linear-gradient(90deg, #a78bfa, #7c3aed);"></div>
        </div>
        <div class="agent-stats">
          <div>Session: <span id="session3">-</span></div>
          <div>耗时: <span id="time3">-</span></div>
        </div>
      </div>
    </div>

    <div class="log-panel">
      <div class="log-header">
        <h3>📋 系统日志</h3>
        <button class="btn btn-secondary" onclick="clearLogs()" style="padding: 6px 12px; font-size: 0.8rem;">清空</button>
      </div>
      <div class="log-list" id="logList">
        <div class="log-entry">等待开始...</div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = () => document.getElementById('apiUrl').value;
    const WORK_DIR = () => document.getElementById('workDir').value;

    const agents = [
      { id: 1, name: '架构师', sessionId: null, task: '设计系统架构', avatar: '🏗️' },
      { id: 2, name: '实现者', sessionId: null, task: '实现核心代码', avatar: '💻' },
      { id: 3, name: '测试者', sessionId: null, task: '编写测试用例', avatar: '🧪' }
    ];

    function log(message, type = 'info') {
      const list = document.getElementById('logList');
      const time = new Date().toLocaleTimeString('zh-CN');
      const div = document.createElement('div');
      div.className = 'log-entry';
      div.innerHTML = `<span class="log-time">${time}</span><span class="log-${type}">${message}</span>`;
      list.appendChild(div);
      list.scrollTop = list.scrollHeight;
    }

    function clearLogs() {
      document.getElementById('logList').innerHTML = '<div class="log-entry">日志已清空</div>';
    }

    function updateAgentCard(i, status, message, progress = 0) {
      const card = document.getElementById(`agent${i}`);
      const statusEl = document.getElementById(`status${i}`);
      const taskEl = document.getElementById(`task${i}`);
      const progressEl = document.getElementById(`progress${i}`);
      const sessionEl = document.getElementById(`session${i}`);

      card.className = 'agent-card' + (status === 'running' ? ' running' : status === 'error' ? ' error' : status === 'completed' ? ' completed' : '');
      statusEl.className = 'status-badge status-' + status;
      statusEl.innerHTML = status === 'running' ? '<span class="pulse"></span> 运行中' : status === 'error' ? '<span>❌</span> 错误' : status === 'completed' ? '<span>✅</span> 完成' : '<span>●</span> 等待中';
      taskEl.textContent = message;
      progressEl.style.width = progress + '%';
      if (agents[i-1].sessionId) {
        sessionEl.textContent = agents[i-1].sessionId.slice(0, 8) + '...';
      }
    }

    async function checkConnection() {
      try {
        const res = await fetch(`${API_URL()}/health`, { method: 'GET' });
        if (res.ok) {
          document.getElementById('connectionStatus').textContent = '已连接';
          document.getElementById('connectionStatus').style.color = '#22c55e';
          return true;
        }
      } catch (e) {
        document.getElementById('connectionStatus').textContent = '未连接';
        document.getElementById('connectionStatus').style.color = '#ef4444';
        log('API 连接失败: ' + e.message, 'error');
      }
      return false;
    }

    async function createAgents() {
      if (!(await checkConnection())) {
        alert('请先启动后端服务: bun src/index.ts');
        return;
      }

      document.getElementById('btnCreate').disabled = true;
      log('开始创建 3 个 Agents...');

      await Promise.all(agents.map(async (agent, i) => {
        const startTime = Date.now();
        updateAgentCard(i + 1, 'running', '创建 session...', 20);

        try {
          const res = await fetch(`${API_URL()}/sessions`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ path: WORK_DIR() })
          });

          if (!res.ok) throw new Error('创建失败: ' + res.status);

          const data = await res.json();
          agent.sessionId = data.sessionId;
          const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
          document.getElementById(`time${i+1}`).textContent = elapsed + 's';

          updateAgentCard(i + 1, 'completed', `Session 创建成功`, 40);
          log(`Agent ${i+1} (${agent.name}): Session ${data.sessionId.slice(0, 8)}... 创建成功`, 'success');
        } catch (e) {
          updateAgentCard(i + 1, 'error', '创建失败: ' + e.message, 0);
          log(`Agent ${i+1} 创建失败: ${e.message}`, 'error');
        }
      }));

      document.getElementById('btnStart').disabled = false;
      log('所有 Agents 创建完成，可以开始协作');
    }

    async function startCollaboration() {
      document.getElementById('btnStart').disabled = true;
      log('开始多 Agent 协作流程...');
      log('协作模式: 架构师 → 实现者 → 测试者 (顺序传递上下文)');

      // 重置流程图
      updateWorkflowStep(1, 'active');
      updateWorkflowStep(2, 'pending');
      updateWorkflowStep(3, 'pending');

      // 第一步：架构师设计架构
      log('=== 第 1 步：架构师设计系统架构 ===');
      const architectResult = await runAgentStep(0, '作为架构师，请设计任务管理 CLI 的完整架构。需要：1) 文件结构 2) 核心类设计 3) 数据持久化方案。请详细说明。', 33);
      if (!architectResult) {
        log('架构师步骤失败，协作终止', 'error');
        updateWorkflowStep(1, 'error');
        return;
      }

      updateWorkflowStep(1, 'completed', '架构文档');
      updateWorkflowStep(2, 'active');
      updateWorkflowArrow(1, true);

      // 第二步：实现者基于架构师的设计实现代码
      log('=== 第 2 步：实现者基于架构设计实现代码 ===');
      log('将架构师的输出传递给实现者...');
      const implementorPrompt = `基于以下架构设计，请实现核心代码：\n\n${architectResult}\n\n请实现：\n1. src/types.ts - 类型定义\n2. src/TaskService.ts - 任务服务类\n3. src/cli.ts - CLI 入口\n\n使用 TypeScript，确保代码符合架构设计。`;
      const implementorResult = await runAgentStep(1, implementorPrompt, 66);
      if (!implementorResult) {
        log('实现者步骤失败，协作终止', 'error');
        updateWorkflowStep(2, 'error');
        return;
      }

      updateWorkflowStep(2, 'completed', '代码实现');
      updateWorkflowStep(3, 'active');
      updateWorkflowArrow(2, true);

      // 第三步：测试者基于实现者的代码编写测试
      log('=== 第 3 步：测试者基于实现编写测试 ===');
      log('将架构设计和代码实现传递给测试者...');
      const testerPrompt = `基于以下架构设计和代码实现，请编写测试用例：\n\n【架构设计】\n${architectResult.substring(0, 1000)}...\n\n【代码实现】\n${implementorResult.substring(0, 1000)}...\n\n请编写：\n1. 单元测试 (使用 Jest/Vitest)\n2. 集成测试\n3. 测试覆盖率目标 80% 以上`;
      const testerResult = await runAgentStep(2, testerPrompt, 100);
      if (!testerResult) {
        log('测试者步骤失败，协作终止', 'error');
        updateWorkflowStep(3, 'error');
        return;
      }

      updateWorkflowStep(3, 'completed', '测试用例');
      log('=== 🎉 多 Agent 协作完成！===');
      log('架构设计 → 代码实现 → 测试覆盖，全流程已完成');
      document.getElementById('btnCreate').disabled = false;
    }

    function updateWorkflowStep(step, state, output = '') {
      const stepEl = document.getElementById(`step${step}`);
      const outputEl = document.getElementById(`output${step}`);

      stepEl.className = 'step-box' + (state === 'active' ? ' active' : state === 'completed' ? ' completed' : state === 'error' ? ' error' : '');
      if (output) outputEl.textContent = output;
      if (state === 'active') outputEl.textContent = '处理中...';
      if (state === 'error') outputEl.textContent = '失败';
    }

    function updateWorkflowArrow(arrow, active) {
      document.getElementById(`arrow${arrow}`).className = 'workflow-arrow' + (active ? ' active' : '');
    }

    async function runAgentStep(i, prompt, progress) {
      const agent = agents[i];
      if (!agent.sessionId) {
        log(`Agent ${i+1} 未创建，跳过`, 'warn');
        return null;
      }

      const startTime = Date.now();
      updateAgentCard(i + 1, 'running', '处理中...', progress - 10);

      try {
        const res = await fetch(`${API_URL()}/sessions/${agent.sessionId}/messages`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: prompt })
        });

        if (!res.ok) throw new Error('发送失败: ' + res.status);

        const data = await res.json();
        const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
        document.getElementById(`time${i+1}`).textContent = elapsed + 's';

        // 显示响应
        const responseEl = document.getElementById(`response${i+1}`);
        responseEl.textContent = data.response.substring(0, 600) + (data.response.length > 600 ? '...' : '');
        responseEl.style.display = 'block';

        updateAgentCard(i + 1, 'completed', `步骤 ${i+1}/3 完成`, progress);
        log(`Agent ${i+1} (${agent.name}): 步骤完成，耗时 ${elapsed}s，输出 ${data.response.length} 字符`, 'success');

        return data.response;
      } catch (e) {
        updateAgentCard(i + 1, 'error', '步骤失败: ' + e.message, progress - 10);
        log(`Agent ${i+1} 步骤失败: ${e.message}`, 'error');
        return null;
      }
    }

    async function fetchSessions() {
      if (!(await checkConnection())) return;

      try {
        const res = await fetch(`${API_URL()}/sessions`);
        const data = await res.json();
        log(`当前 Sessions: ${data.sessions.length} 个`);
        data.sessions.forEach(s => {
          log(`  - ${s.sessionId.slice(0, 8)}... (${s.status})`);
        });
      } catch (e) {
        log('获取 sessions 失败: ' + e.message, 'error');
      }
    }

    async function clearAll() {
      if (!(await checkConnection())) return;

      log('清空所有 sessions...');

      // 获取所有 sessions
      try {
        const res = await fetch(`${API_URL()}/sessions`);
        const data = await res.json();

        await Promise.all(data.sessions.map(async s => {
          try {
            await fetch(`${API_URL()}/sessions/${s.sessionId}`, { method: 'DELETE' });
            log(`删除 session: ${s.sessionId.slice(0, 8)}...`, 'success');
          } catch (e) {
            log(`删除失败: ${e.message}`, 'error');
          }
        }));

        // 重置状态
        agents.forEach((agent, i) => {
          agent.sessionId = null;
          updateAgentCard(i + 1, 'idle', '已清空', 0);
          document.getElementById(`session${i+1}`).textContent = '-';
          document.getElementById(`time${i+1}`).textContent = '-';
          document.getElementById(`response${i+1}`).style.display = 'none';
        });

        document.getElementById('btnCreate').disabled = false;
        document.getElementById('btnStart').disabled = true;
        log('所有 sessions 已清空');
      } catch (e) {
        log('清空失败: ' + e.message, 'error');
      }
    }

    // 页面加载时检查连接
    window.onload = () => checkConnection();
  </script>
</body>
</html>
