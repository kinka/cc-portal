<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CC-Agents 多租户演示</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    header {
      text-align: center;
      padding: 20px 0;
      border-bottom: 1px solid #334155;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 1.8rem;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* 配置栏 */
    .config-panel {
      background: #1e293b;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
      border: 1px solid #334155;
    }
    .config-row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 12px;
    }
    .config-row:last-child { margin-bottom: 0; }
    .config-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .config-item label {
      font-size: 0.875rem;
      color: #94a3b8;
      white-space: nowrap;
    }
    .config-item input, .config-item select {
      background: #0f172a;
      border: 1px solid #334155;
      color: #e2e8f0;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.875rem;
    }
    .config-item input:focus, .config-item select:focus {
      outline: none;
      border-color: #60a5fa;
    }
    .config-item input[type="text"] { width: 200px; }
    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-primary:hover { background: #2563eb; }
    .btn-success { background: #22c55e; color: white; }
    .btn-success:hover { background: #16a34a; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-danger:hover { background: #dc2626; }
    .btn-secondary { background: #334155; color: #e2e8f0; }
    .btn-secondary:hover { background: #475569; }

    /* 主内容区 */
    .main-layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 20px;
    }

    /* 侧边栏 */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .panel {
      background: #1e293b;
      border-radius: 12px;
      border: 1px solid #334155;
      overflow: hidden;
    }
    .panel-header {
      padding: 12px 16px;
      background: #0f172a;
      border-bottom: 1px solid #334155;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .panel-content {
      padding: 12px;
      max-height: 300px;
      overflow-y: auto;
    }

    /* 用户列表 */
    .user-item {
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 8px;
      border: 1px solid transparent;
    }
    .user-item:hover { background: #334155; }
    .user-item.active {
      background: rgba(59, 130, 246, 0.2);
      border-color: #3b82f6;
    }
    .user-name { font-weight: 500; margin-bottom: 2px; }
    .user-info { font-size: 0.75rem; color: #94a3b8; }

    /* Session 列表 */
    .session-item {
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 8px;
      border: 1px solid transparent;
      background: #0f172a;
    }
    .session-item:hover { background: #334155; }
    .session-item.active {
      background: rgba(34, 197, 94, 0.2);
      border-color: #22c55e;
    }
    .session-id { font-family: monospace; font-size: 0.8rem; color: #60a5fa; }
    .session-path { font-size: 0.75rem; color: #94a3b8; margin-top: 4px; }
    /* 聊天区 */
    .chat-container {
      background: #1e293b;
      border-radius: 12px;
      border: 1px solid #334155;
      display: flex;
      flex-direction: column;
      height: 600px;
    }
    .chat-header {
      padding: 16px;
      border-bottom: 1px solid #334155;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .chat-title { font-weight: 600; }
    .chat-subtitle { font-size: 0.8rem; color: #94a3b8; margin-top: 2px; }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 0.9rem;
      line-height: 1.5;
    }
    .message-user {
      align-self: flex-end;
      background: #3b82f6;
      color: white;
      border-bottom-right-radius: 4px;
    }
    .message-assistant {
      align-self: flex-start;
      background: #334155;
      color: #e2e8f0;
      border-bottom-left-radius: 4px;
    }
    .message-time {
      font-size: 0.7rem;
      opacity: 0.7;
      margin-top: 4px;
    }
    .chat-input-area {
      padding: 16px;
      border-top: 1px solid #334155;
      display: flex;
      gap: 12px;
    }
    .chat-input {
      flex: 1;
      background: #0f172a;
      border: 1px solid #334155;
      color: #e2e8f0;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      resize: none;
    }
    .chat-input:focus { outline: none; border-color: #60a5fa; }
    .chat-input:disabled { opacity: 0.5; cursor: not-allowed; }

    /* 日志区 */
    .log-panel {
      margin-top: 20px;
      background: #1e293b;
      border-radius: 12px;
      border: 1px solid #334155;
      overflow: hidden;
    }
    .log-header {
      padding: 12px 16px;
      background: #0f172a;
      border-bottom: 1px solid #334155;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .log-content {
      max-height: 200px;
      overflow-y: auto;
      padding: 12px;
      font-family: monospace;
      font-size: 0.8rem;
    }
    .log-entry {
      padding: 4px 0;
      border-bottom: 1px solid #334155;
    }
    .log-entry:last-child { border-bottom: none; }
    .log-time { color: #64748b; margin-right: 8px; }
    .log-info { color: #60a5fa; }
    .log-success { color: #22c55e; }
    .log-error { color: #ef4444; }
    .log-warn { color: #f59e0b; }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 40px;
      color: #64748b;
    }
    .empty-state-icon { font-size: 3rem; margin-bottom: 12px; }

    /* 工具调用显示 */
    .tool-call {
      background: #0f172a;
      border-left: 3px solid #22d3ee;
      padding: 8px 12px;
      margin: 8px 0;
      border-radius: 0 8px 8px 0;
      font-size: 0.8rem;
    }
    .tool-call-name { color: #22d3ee; font-weight: 500; }
    .tool-call-input { color: #64748b; margin-top: 4px; }

    @media (max-width: 768px) {
      .main-layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🤖 CC-Agents 多租户演示</h1>
    </header>

    <!-- 配置栏 -->
    <div class="config-panel">
      <div class="config-row">
        <div class="config-item">
          <label>API 地址:</label>
          <input type="text" id="apiUrl" value="http://localhost:3333" placeholder="http://localhost:3333">
        </div>
        <div class="config-item">
          <label>当前用户:</label>
          <input type="text" id="currentUser" value="demo-user" placeholder="输入用户ID">
        </div>
        <button class="btn btn-secondary" onclick="refreshAll()">🔄 刷新</button>
        <button class="btn btn-success" onclick="createSession()">➕ 创建 Session</button>
      </div>
      <div class="config-row">
        <div class="config-item">
          <label>工作目录:</label>
          <input type="text" id="workDir" value="" placeholder="留空使用用户默认目录">
        </div>
        <button class="btn btn-primary" onclick="switchUser()">👤 切换用户</button>
        <button class="btn btn-danger" onclick="deleteCurrentSession()">🗑️ 删除当前 Session</button>
        <button class="btn btn-danger" onclick="clearAllSessions()" title="清空当前用户的所有 Sessions">🗑️🗑️ 清空所有 Sessions</button>
      </div>
    </div>

    <!-- 主内容 -->
    <div class="main-layout">
      <!-- 侧边栏 -->
      <div class="sidebar">
        <!-- 用户列表 -->
        <div class="panel">
          <div class="panel-header">
            <span>👥 所有用户</span>
            <button class="btn btn-secondary" style="padding: 4px 8px; font-size: 0.75rem;" onclick="loadUsers()">刷新</button>
          </div>
          <div class="panel-content" id="userList">
            <div class="empty-state">
              <div class="empty-state-icon">👥</div>
              <div>加载中...</div>
            </div>
          </div>
        </div>

        <!-- Session 列表 -->
        <div class="panel">
          <div class="panel-header">
            <span>💬 我的 Sessions</span>
            <span id="sessionCount" style="font-size: 0.75rem; color: #94a3b8;">0</span>
          </div>
          <div class="panel-content" id="sessionList">
            <div class="empty-state">
              <div class="empty-state-icon">💬</div>
              <div>暂无 Session</div>
            </div>
          </div>
        </div>
      </div>

      <!-- 聊天区 -->
      <div class="chat-container">
        <div class="chat-header">
          <div>
            <div class="chat-title" id="chatTitle">选择一个 Session 开始对话</div>
            <div class="chat-subtitle" id="chatSubtitle">-</div>
          </div>
          <div id="chatStatus" style="font-size: 0.8rem; color: #94a3b8;">未连接</div>
        </div>
        <div class="chat-messages" id="chatMessages">
          <div class="empty-state">
            <div class="empty-state-icon">🤖</div>
            <div>选择左侧 Session 开始对话</div>
          </div>
        </div>
        <div class="chat-input-area">
          <textarea class="chat-input" id="messageInput" rows="2" placeholder="输入消息..." disabled></textarea>
          <button class="btn btn-primary" id="sendBtn" onclick="sendMessage()" disabled>发送</button>
        </div>
      </div>
    </div>

    <!-- 日志区 -->
    <div class="log-panel">
      <div class="log-header">
        <span>📝 系统日志</span>
        <button class="btn btn-secondary" style="padding: 4px 8px; font-size: 0.75rem;" onclick="clearLogs()">清空</button>
      </div>
      <div class="log-content" id="logContent">
        <div class="log-entry"><span class="log-time">--:--:--</span>等待开始...</div>
      </div>
    </div>
  </div>

  <script>
    // Parse URL parameters for user
    const urlParams = new URLSearchParams(window.location.search);
    const urlUser = urlParams.get('user');
    
    let currentUserId = urlUser || 'demo-user';
    let currentSessionId = null;
    let currentSessions = [];
    let isStreaming = false;
    let messageHistory = [];
    
    // Set the user input field if user is specified in URL
    if (urlUser) {
      document.getElementById('currentUser').value = urlUser;
    }


    function getApiUrl() {
      return document.getElementById('apiUrl').value || 'http://localhost:3333';
    }

    function log(message, type = 'info') {
      const logContent = document.getElementById('logContent');
      const time = new Date().toLocaleTimeString('zh-CN');
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.innerHTML = `<span class="log-time">${time}</span><span class="log-${type}">${message}</span>`;
      logContent.appendChild(entry);
      logContent.scrollTop = logContent.scrollHeight;
    }

    // 加载用户列表（通过 admin API）
    async function loadUsers() {
      try {
        const res = await fetch(`${getApiUrl()}/admin/users?userId=${currentUserId}`, {
          headers: { 'X-Admin-Token': 'change-me-in-production' }
        });
        if (!res.ok) {
          log('加载用户列表失败（需要 Admin Token）', 'warn');
          // 显示当前用户
          renderUsers([{ userId: currentUserId, maxSessions: 5, activeSessions: currentSessions.length }]);
          return;
        }
        const data = await res.json();
        renderUsers(data.users);
        log(`加载了 ${data.users.length} 个用户`, 'success');
      } catch (e) {
        log('加载用户失败: ' + e.message, 'error');
      }
    }

    function renderUsers(users) {
      const container = document.getElementById('userList');
      if (!users || users.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">👥</div><div>暂无用户</div></div>';
        return;
      }
      container.innerHTML = users.map(u => `
        <div class="user-item ${u.userId === currentUserId ? 'active' : ''}" onclick="selectUser('${u.userId}')">
          <div class="user-name">👤 ${u.userId}</div>
          <div class="user-info">配额: ${u.activeSessions || 0}/${u.maxSessions} sessions</div>
        </div>
      `).join('');
    }

    // 选择用户
    function selectUser(userId) {
      currentUserId = userId;
      document.getElementById('currentUser').value = userId;
      currentSessionId = null;
      messageHistory = [];
      updateChatUI();
      loadSessions();
      loadUsers();
      log(`切换到用户: ${userId}`, 'info');
    }

    function switchUser() {
      const userId = document.getElementById('currentUser').value.trim();
      if (!userId) {
        alert('请输入用户ID');
        return;
      }
      selectUser(userId);
    }

    // 加载当前用户的 sessions
    async function loadSessions() {
      try {
        const res = await fetch(`${getApiUrl()}/sessions?userId=${currentUserId}`);
        if (!res.ok) {
          const err = await res.json();
          log('加载 Sessions 失败: ' + (err.error || res.status), 'error');
          return;
        }
        const data = await res.json();
        currentSessions = data.sessions || [];
        document.getElementById('sessionCount').textContent = currentSessions.length;
        renderSessions();
        log(`加载了 ${currentSessions.length} 个 sessions`, 'success');
      } catch (e) {
        log('加载 Sessions 失败: ' + e.message, 'error');
      }
    }

    function renderSessions() {
      const container = document.getElementById('sessionList');
      if (currentSessions.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">💬</div><div>暂无 Session</div></div>';
        return;
      }
      container.innerHTML = currentSessions.map(s => `
        <div class="session-item ${s.sessionId === currentSessionId ? 'active' : ''}" onclick="selectSession('${s.sessionId}')">
          <span class="session-id">${s.sessionId.slice(0, 16)}...</span>
          <div class="session-path">📁 ${s.path}</div>
        </div>
      `).join('');
    }

    // 选择 session
    async function selectSession(sessionId) {
      currentSessionId = sessionId;
      const session = currentSessions.find(s => s.sessionId === sessionId);
      updateChatUI();
      renderSessions();

      if (session) {
        document.getElementById('chatTitle').textContent = `Session: ${sessionId.slice(0, 16)}...`;
        document.getElementById('chatSubtitle').textContent = `📁 ${session.path}`;
        document.getElementById('chatStatus').textContent = '🟢 已连接';
        document.getElementById('messageInput').disabled = false;
        document.getElementById('sendBtn').disabled = false;

        // 加载历史消息
        await loadSessionDetails(sessionId);
      }

      log(`切换到 Session: ${sessionId.slice(0, 16)}...`, 'info');
    }

    async function loadSessionDetails(sessionId) {
      try {
        const res = await fetch(`${getApiUrl()}/sessions/${sessionId}?userId=${currentUserId}`);
        if (!res.ok) return;
        const data = await res.json();
        messageHistory = data.messages || [];
        renderMessages();
      } catch (e) {
        log('加载消息历史失败: ' + e.message, 'error');
      }
    }

    function renderMessages() {
      const container = document.getElementById('chatMessages');
      if (messageHistory.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">💬</div><div>开始对话吧</div></div>';
        return;
      }
      container.innerHTML = messageHistory.map(m => `
        <div class="message message-${m.role}">
          <div>${escapeHtml(m.content)}</div>
          <div class="message-time">${new Date(m.timestamp).toLocaleTimeString('zh-CN')}</div>
        </div>
      `).join('');
      container.scrollTop = container.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function updateChatUI() {
      if (!currentSessionId) {
        document.getElementById('chatTitle').textContent = '选择一个 Session 开始对话';
        document.getElementById('chatSubtitle').textContent = '-';
        document.getElementById('chatStatus').textContent = '未连接';
        document.getElementById('messageInput').disabled = true;
        document.getElementById('sendBtn').disabled = true;
        document.getElementById('chatMessages').innerHTML = '<div class="empty-state"><div class="empty-state-icon">🤖</div><div>选择左侧 Session 开始对话</div></div>';
      }
    }

    // 创建 session
    async function createSession() {
      const workDir = document.getElementById('workDir').value.trim();
      try {
        log('创建 Session...', 'info');
        const body = workDir ? { path: workDir } : {};
        const res = await fetch(`${getApiUrl()}/sessions?userId=${currentUserId}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        if (!res.ok) {
          const err = await res.json();
          if (res.status === 429) {
            alert(`配额不足: ${err.quota?.used}/${err.quota?.max}`);
          }
          throw new Error(err.error || res.status);
        }
        const data = await res.json();
        log(`Session 创建成功: ${data.sessionId.slice(0, 16)}...`, 'success');
        loadSessions();
        selectSession(data.sessionId);
      } catch (e) {
        log('创建 Session 失败: ' + e.message, 'error');
      }
    }

    // 发送消息
    async function sendMessage() {
      if (!currentSessionId || isStreaming) return;

      const input = document.getElementById('messageInput');
      const message = input.value.trim();
      if (!message) return;

      // 添加用户消息
      messageHistory.push({
        role: 'user',
        content: message,
        timestamp: new Date().toISOString()
      });
      renderMessages();
      input.value = '';

      isStreaming = true;
      document.getElementById('sendBtn').disabled = true;
      document.getElementById('messageInput').disabled = true;

      // 添加占位符用于流式输出
      const assistantMsg = { role: 'assistant', content: '', timestamp: new Date().toISOString() };
      messageHistory.push(assistantMsg);

      try {
        const encodedMsg = encodeURIComponent(message);
        const url = `${getApiUrl()}/sessions/${currentSessionId}/stream?userId=${currentUserId}&message=${encodedMsg}`;

        log('开始流式响应...', 'info');
        const eventSource = new EventSource(url);
        let fullText = '';

        eventSource.onmessage = (event) => {
          if (event.data === '[DONE]') {
            eventSource.close();
            isStreaming = false;
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('messageInput').disabled = false;
            document.getElementById('messageInput').focus();
            log('响应完成', 'success');
            return;
          }

          try {
            const chunk = JSON.parse(event.data);
            if (chunk.type === 'text' && chunk.content) {
              fullText += chunk.content;
              assistantMsg.content = fullText;
              renderMessages();
            } else if (chunk.type === 'tool_start') {
              log(`工具调用: ${chunk.toolName}`, 'warn');
            }
          } catch (e) {
            // 非 JSON 数据
            fullText += event.data;
            assistantMsg.content = fullText;
            renderMessages();
          }
        };

        eventSource.onerror = (err) => {
          eventSource.close();
          isStreaming = false;
          document.getElementById('sendBtn').disabled = false;
          document.getElementById('messageInput').disabled = false;
          log('流式连接错误', 'error');
        };

      } catch (e) {
        log('发送消息失败: ' + e.message, 'error');
        isStreaming = false;
        document.getElementById('sendBtn').disabled = false;
        document.getElementById('messageInput').disabled = false;
      }
    }

    // 删除当前 session
    async function deleteCurrentSession() {
      if (!currentSessionId) {
        alert('请先选择 Session');
        return;
      }

      try {
        const res = await fetch(`${getApiUrl()}/sessions/${currentSessionId}?userId=${currentUserId}`, {
          method: 'DELETE'
        });
        if (!res.ok) throw new Error('删除失败');
        log('Session 已删除', 'success');
        currentSessionId = null;
        messageHistory = [];
        updateChatUI();
        loadSessions();
      } catch (e) {
        log('删除失败: ' + e.message, 'error');
      }
    }

    function refreshAll() {
      loadUsers();
      loadSessions();
      if (currentSessionId) {
        loadSessionDetails(currentSessionId);
      }
    }

    function clearLogs() {
      document.getElementById('logContent').innerHTML = '<div class="log-entry"><span class="log-time">--:--:--</span>日志已清空</div>';
    }

    // 清空当前用户的所有 Sessions
    async function clearAllSessions() {
      if (!currentUserId) {
        alert('请先设置用户ID');
        return;
      }
      
      log(`开始清空用户 ${currentUserId} 的所有 Sessions...`, 'warn');
      
      try {
        // 关闭当前 EventSource
        if (currentSessionId) {
          currentSessionId = null;
          messageHistory = [];
          updateChatUI();
        }
        
        // 获取当前用户的所有 Sessions
        const res = await fetch(`${getApiUrl()}/sessions?userId=${currentUserId}`);
        if (!res.ok) throw new Error('获取 Sessions 失败');
        
        const data = await res.json();
        const sessions = data.sessions || [];
        
        if (sessions.length === 0) {
          log('该用户没有 Sessions', 'info');
          return;
        }
        
        log(`找到 ${sessions.length} 个 Sessions，开始删除...`, 'info');
        
        // 逐个删除
        let successCount = 0;
        let failCount = 0;
        for (const session of sessions) {
          try {
            const deleteRes = await fetch(`${getApiUrl()}/sessions/${session.sessionId}?userId=${currentUserId}`, {
              method: 'DELETE'
            });
            if (deleteRes.ok) {
              successCount++;
              log(`已删除: ${session.sessionId.slice(0, 16)}...`, 'success');
            } else {
              failCount++;
              log(`删除失败: ${session.sessionId.slice(0, 16)}...`, 'error');
            }
          } catch (e) {
            failCount++;
            log(`删除异常: ${session.sessionId.slice(0, 16)}... - ${e.message}`, 'error');
          }
        }
        
        log(`清空完成: 成功 ${successCount} 个, 失败 ${failCount} 个`, successCount > 0 ? 'success' : 'error');
        loadSessions();
      } catch (e) {
        log('清空 Sessions 失败: ' + e.message, 'error');
      }
    }

    // 回车发送
    document.getElementById('messageInput')?.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // 初始化
    window.onload = () => {
      loadUsers();
      loadSessions();
    };
  </script>
</body>
</html>
