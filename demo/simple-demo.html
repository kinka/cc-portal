<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CC-Portal 多租户演示</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 12px;
      overflow: hidden;
    }

    header {
      text-align: center;
      padding: 8px 0;
      border-bottom: 1px solid #334155;
      margin-bottom: 12px;
      flex-shrink: 0;
    }

    h1 {
      font-size: 1.4rem;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* 配置栏 */
    .config-panel {
      background: #1e293b;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 12px;
      border: 1px solid #334155;
      flex-shrink: 0;
    }

    .config-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 8px;
    }

    .config-row:last-child {
      margin-bottom: 0;
    }

    .config-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .config-item label {
      font-size: 0.8rem;
      color: #94a3b8;
      white-space: nowrap;
    }

    .config-item input,
    .config-item select {
      background: #0f172a;
      border: 1px solid #334155;
      color: #e2e8f0;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.8rem;
    }

    .config-item input:focus,
    .config-item select:focus {
      outline: none;
      border-color: #60a5fa;
    }

    .config-item input[type="text"] {
      width: 160px;
    }

    .btn {
      padding: 4px 10px;
      border-radius: 4px;
      border: none;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .btn-primary {
      background: #3b82f6;
      color: white;
    }

    .btn-primary:hover {
      background: #2563eb;
    }

    .btn-success {
      background: #22c55e;
      color: white;
    }

    .btn-success:hover {
      background: #16a34a;
    }

    .btn-danger {
      background: #ef4444;
      color: white;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    .btn-secondary {
      background: #334155;
      color: #e2e8f0;
    }

    .btn-secondary:hover {
      background: #475569;
    }

    /* 主内容区 */
    .main-layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 12px;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* 侧边栏 */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 12px;
      height: 100%;
      min-height: 0;
    }

    .panel {
      background: #1e293b;
      border-radius: 8px;
      border: 1px solid #334155;
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    .panel-header {
      padding: 8px 12px;
      background: #0f172a;
      border-bottom: 1px solid #334155;
      font-weight: 600;
      font-size: 0.85rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .panel-content {
      padding: 8px;
      overflow-y: auto;
      flex: 1;
      min-height: 0;
    }

    /* 用户列表 */
    .user-item {
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 8px;
      border: 1px solid transparent;
    }

    .user-item:hover {
      background: #334155;
    }

    .user-item.active {
      background: rgba(59, 130, 246, 0.2);
      border-color: #3b82f6;
    }

    .user-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2px;
    }

    .user-name {
      font-weight: 500;
    }

    .user-info {
      font-size: 0.75rem;
      color: #94a3b8;
    }

    .btn-delete {
      background: transparent;
      border: none;
      color: #64748b;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.8rem;
      line-height: 1;
    }

    .btn-delete:hover {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
    }

    /* Session 列表 */
    .session-item {
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 8px;
      border: 1px solid transparent;
      background: #0f172a;
    }

    .session-item:hover {
      background: #334155;
    }

    .session-item.active {
      background: rgba(34, 197, 94, 0.2);
      border-color: #22c55e;
    }

    .session-id {
      font-family: monospace;
      font-size: 0.8rem;
      color: #60a5fa;
    }

    .session-path {
      font-size: 0.75rem;
      color: #94a3b8;
      margin-top: 4px;
    }

    /* 聊天区 */
    .chat-container {
      background: #1e293b;
      border-radius: 8px;
      border: 1px solid #334155;
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 0;
    }

    .chat-header {
      padding: 16px;
      border-bottom: 1px solid #334155;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-title {
      font-weight: 600;
    }

    .chat-subtitle {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-top: 2px;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .message-user {
      align-self: flex-end;
      background: #3b82f6;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message-assistant {
      align-self: flex-start;
      background: #334155;
      color: #e2e8f0;
      border-bottom-left-radius: 4px;
    }

    .message-time {
      font-size: 0.7rem;
      opacity: 0.7;
      margin-top: 4px;
    }

    .chat-input-area {
      padding: 16px;
      border-top: 1px solid #334155;
      display: flex;
      gap: 12px;
    }

    .chat-input {
      flex: 1;
      background: #0f172a;
      border: 1px solid #334155;
      color: #e2e8f0;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      resize: none;
    }

    .chat-input:focus {
      outline: none;
      border-color: #60a5fa;
    }

    .chat-input:disabled,
    .chat-input.disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn.disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* 日志区 */
    .log-panel {
      margin-top: 12px;
      background: #1e293b;
      border-radius: 8px;
      border: 1px solid #334155;
      overflow: hidden;
      flex-shrink: 0;
      max-height: 150px;
    }

    .log-header {
      padding: 6px 12px;
      background: #0f172a;
      border-bottom: 1px solid #334155;
      font-weight: 600;
      font-size: 0.8rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .log-content {
      max-height: 100px;
      overflow-y: auto;
      padding: 8px;
      font-family: monospace;
      font-size: 0.75rem;
    }

    .log-entry {
      padding: 4px 0;
      border-bottom: 1px solid #334155;
    }

    .log-entry:last-child {
      border-bottom: none;
    }

    .log-time {
      color: #64748b;
      margin-right: 8px;
    }

    .log-info {
      color: #60a5fa;
    }

    .log-success {
      color: #22c55e;
    }

    .log-error {
      color: #ef4444;
    }

    .log-warn {
      color: #f59e0b;
    }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 20px;
      color: #64748b;
    }

    .empty-state-icon {
      font-size: 2rem;
      margin-bottom: 8px;
    }

    /* 工具调用显示 */
    .tool-call {
      background: #0f172a;
      border-left: 3px solid #22d3ee;
      padding: 8px 12px;
      margin: 8px 0;
      border-radius: 0 8px 8px 0;
      font-size: 0.8rem;
    }

    .tool-call-name {
      color: #22d3ee;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .tool-call-name:hover {
      opacity: 0.8;
    }

    .tool-call-name .expand-icon {
      font-size: 0.7rem;
      transition: transform 0.2s;
    }

    .tool-call-name.collapsed .expand-icon {
      transform: rotate(-90deg);
    }

    .tool-call-input {
      color: #64748b;
      margin-top: 4px;
      word-break: break-all;
      overflow: hidden;
    }

    .tool-call-input.collapsed {
      max-height: 4.5em;
    }

    .tool-call-input.expanded {
      max-height: none;
    }

    .tool-result {
      background: #1e3a3a;
      border-left: 3px solid #22c55e;
      padding: 8px 12px;
      margin: 4px 0 8px 0;
      border-radius: 0 8px 8px 0;
      font-size: 0.8rem;
    }

    .tool-result .tool-call-name {
      color: #22c55e;
    }

    .message-tools {
      font-size: 0.7rem;
      color: #64748b;
      margin-top: 4px;
    }

    @media (max-width: 768px) {
      .main-layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h1>🤖 CC-Portal 多租户演示</h1>
    </header>

    <!-- 配置栏 -->
    <div class="config-panel">
      <div class="config-row">
        <div class="config-item">
          <label>API 地址:</label>
          <input type="text" id="apiUrl" value="http://localhost:9033" placeholder="http://localhost:9033"
            onchange="refreshAll()">
        </div>
        <div class="config-item">
          <label>当前用户:</label>
          <input type="text" id="currentUser" value="demo-user" placeholder="输入用户ID">
        </div>
        <button class="btn btn-secondary" onclick="refreshAll()">🔄 刷新</button>
        <button class="btn btn-success" onclick="createSession()">➕ 创建 Session</button>
      </div>
      <div class="config-row">
        <div class="config-item">
          <label>工作目录:</label>
          <input type="text" id="workDir" value="" placeholder="留空使用用户默认目录">
        </div>
        <button class="btn btn-primary" onclick="switchUser()">👤 切换用户</button>
        <button class="btn btn-danger" onclick="deleteCurrentSession()">🗑️ 删除当前 Session</button>
        <button class="btn btn-danger" onclick="clearAllSessions()" title="清空当前用户的所有 Sessions">🗑️🗑️ 清空所有
          Sessions</button>
        <button class="btn btn-secondary" onclick="openMcpConfig()">⚙️ 配置 MCP 服务</button>
      </div>
    </div>

    <!-- 主内容 -->
    <div class="main-layout">
      <!-- 侧边栏 -->
      <div class="sidebar">
        <!-- 用户列表 -->
        <div class="panel">
          <div class="panel-header">
            <span>👥 所有用户</span>
            <button class="btn btn-secondary" style="padding: 4px 8px; font-size: 0.75rem;"
              onclick="loadUsers()">刷新</button>
          </div>
          <div class="panel-content" id="userList">
            <div class="empty-state">
              <div class="empty-state-icon">👥</div>
              <div>加载中...</div>
            </div>
          </div>
        </div>

        <!-- Session 列表 -->
        <div class="panel">
          <div class="panel-header">
            <span>💬 我的 Sessions</span>
            <span id="sessionCount" style="font-size: 0.75rem; color: #94a3b8;">0</span>
          </div>
          <div class="panel-content" id="sessionList">
            <div class="empty-state">
              <div class="empty-state-icon">💬</div>
              <div>暂无 Session</div>
            </div>
          </div>
        </div>
      </div>

      <!-- 聊天区 -->
      <div class="chat-container">
        <div class="chat-header">
          <div>
            <div class="chat-title" id="chatTitle">选择一个 Session 开始对话</div>
            <div class="chat-subtitle" id="chatSubtitle">-</div>
          </div>
          <div id="chatStatus" style="font-size: 0.8rem; color: #94a3b8;">未连接</div>
        </div>
        <div class="chat-messages" id="chatMessages">
          <div class="empty-state">
            <div class="empty-state-icon">🤖</div>
            <div>选择左侧 Session 开始对话</div>
          </div>
        </div>
        <div class="chat-input-area">
          <textarea class="chat-input" id="messageInput" rows="2" placeholder="输入消息..."></textarea>
          <button class="btn btn-primary" id="sendBtn" onclick="handleSend()">发送</button>
        </div>
      </div>
    </div>

    <!-- 日志区 -->
    <div class="log-panel">
      <div class="log-header">
        <span>📝 系统日志</span>
        <button class="btn btn-secondary" style="padding: 4px 8px; font-size: 0.75rem;"
          onclick="clearLogs()">清空</button>
      </div>
      <div class="log-content" id="logContent">
        <div class="log-entry"><span class="log-time">--:--:--</span>等待开始...</div>
      </div>
    </div>
  </div>

  <!-- MCP 配置 Modal -->
  <div id="mcpModal"
    style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px);">
    <div
      style="background: #1e293b; padding: 20px; border-radius: 8px; border: 1px solid #334155; width: 600px; max-width: 90vw;">
      <h3 style="margin-bottom: 12px; color: #fff;">⚙️ 用户 MCP 配置</h3>
      <p style="font-size: 0.8rem; color: #94a3b8; margin-bottom: 12px;">编辑当前用户的 .mcp.json 文件 (JSON 格式)</p>
      <textarea id="mcpConfigText"
        style="width: 100%; height: 300px; background: #0f172a; color: #e2e8f0; border: 1px solid #334155; padding: 12px; font-family: monospace; border-radius: 4px; resize: vertical;"
        spellcheck="false"></textarea>
      <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 16px;">
        <button class="btn btn-secondary" onclick="closeMcpConfig()">取消</button>
        <button class="btn btn-primary" onclick="saveMcpConfig()">💾 保存配置</button>
      </div>
    </div>
  </div>

  <script>
    // Parse URL parameters for user
    const urlParams = new URLSearchParams(window.location.search);
    const urlUser = urlParams.get('user');

    let currentUserId = urlUser || 'demo-user';
    let currentSessionId = null;
    let currentSessions = [];
    let isStreaming = false;
    let messageHistory = [];
    let mcpServers = {};  // MCP 服务配置
    // Set the user input field if user is specified in URL
    if (urlUser) {
      document.getElementById('currentUser').value = urlUser;
    }

    // 更新 URL 参数（不刷新页面）
    function updateUrlUser(userId) {
      const url = new URL(window.location);
      url.searchParams.set('user', userId);
      window.history.replaceState({}, '', url);
    }

    // 初始化时更新 URL
    updateUrlUser(currentUserId);


    function getApiUrl() {
      return document.getElementById('apiUrl').value || 'http://localhost:9033';
    }

    function log(message, type = 'info') {
      const logContent = document.getElementById('logContent');
      const time = new Date().toLocaleTimeString('zh-CN');
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.innerHTML = `<span class="log-time">${time}</span><span class="log-${type}">${message}</span>`;
      logContent.appendChild(entry);
      logContent.scrollTop = logContent.scrollHeight;
    }

    // 加载用户列表（通过 admin API）
    async function loadUsers() {
      try {
        const res = await fetch(`${getApiUrl()}/admin/users?userId=${currentUserId}`, {
          headers: { 'X-Admin-Token': 'change-me-in-production' }
        });
        if (!res.ok) {
          log('加载用户列表失败（需要 Admin Token）', 'warn');
          // 显示当前用户
          renderUsers([{ userId: currentUserId, maxSessions: 5, activeSessions: currentSessions.length }]);
          return;
        }
        const data = await res.json();
        renderUsers(data.users);
        log(`加载了 ${data.users.length} 个用户`, 'success');
      } catch (e) {
        log('加载用户失败: ' + e.message, 'error');
      }
    }

    function renderUsers(users) {
      const container = document.getElementById('userList');
      if (!users || users.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">👥</div><div>暂无用户</div></div>';
        return;
      }
      container.innerHTML = users.map(u => `
        <div class="user-item ${u.userId === currentUserId ? 'active' : ''}" onclick="selectUser('${u.userId}')">
          <div class="user-header">
            <span class="user-name">👤 ${u.userId}</span>
            <button class="btn-delete" onclick="event.stopPropagation(); deleteUser('${u.userId}')" title="删除用户">✕</button>
          </div>
          <div class="user-info">配额: ${u.used ?? 0}/${u.maxSessions}</div>
        </div>
      `).join('');
    }

    // 选择用户
    function selectUser(userId) {
      currentUserId = userId;
      document.getElementById('currentUser').value = userId;
      currentSessionId = null;
      messageHistory = [];
      updateUrlUser(userId);  // 更新 URL 参数
      updateChatUI();
      loadSessions();
      loadUsers();
      log(`切换到用户: ${userId}`, 'info');
    }

    // 删除用户
    async function deleteUser(userId) {
      if (userId === currentUserId) {
        log('不能删除当前用户，请先切换到其他用户', 'error');
        return;
      }

      try {
        log(`删除用户: ${userId}...`, 'warn');
        const res = await fetch(`${getApiUrl()}/admin/users/${userId}?userId=${currentUserId}`, {
          method: 'DELETE',
          headers: { 'X-Admin-Token': 'change-me-in-production' }
        });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || res.status);
        }
        log(`用户 ${userId} 已删除`, 'success');
        loadUsers();
      } catch (e) {
        log('删除用户失败: ' + e.message, 'error');
      }
    }

    function switchUser() {
      const userId = document.getElementById('currentUser').value.trim();
      if (!userId) {
        alert('请输入用户ID');
        return;
      }
      selectUser(userId);
    }

    async function openMcpConfig() {
      try {
        const res = await fetch(`${getApiUrl()}/mcp?userId=${currentUserId}`);
        if (!res.ok) throw new Error(await res.text());
        const data = await res.json();
        document.getElementById('mcpConfigText').value = JSON.stringify(data, null, 2);
        document.getElementById('mcpModal').style.display = 'flex';
      } catch (err) {
        log('获取 MCP 配置失败: ' + err.message, 'error');
      }
    }

    function closeMcpConfig() {
      document.getElementById('mcpModal').style.display = 'none';
    }

    async function saveMcpConfig() {
      const text = document.getElementById('mcpConfigText').value;
      let config;
      try {
        config = JSON.parse(text);
      } catch(e) {
        alert('JSON 格式无效: ' + e.message);
        return;
      }
      try {
        const res = await fetch(`${getApiUrl()}/mcp?userId=${currentUserId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(config)
        });
        if (!res.ok) throw new Error(await res.text());
        log('MCP 配置已保存', 'success');
        closeMcpConfig();
      } catch (err) {
        log('保存 MCP 配置失败: ' + err.message, 'error');
      }
    }

    // 加载当前用户的 sessions
    async function loadSessions() {
      try {
        const res = await fetch(`${getApiUrl()}/sessions?userId=${currentUserId}`);
        if (!res.ok) {
          const err = await res.json();
          log('加载 Sessions 失败: ' + (err.error || res.status), 'error');
          return;
        }
        const data = await res.json();
        currentSessions = data.sessions || [];
        document.getElementById('sessionCount').textContent = currentSessions.length;
        renderSessions();
        log(`加载了 ${currentSessions.length} 个 sessions`, 'success');
      } catch (e) {
        log('加载 Sessions 失败: ' + e.message, 'error');
      }
    }

    function renderSessions() {
      const container = document.getElementById('sessionList');
      if (currentSessions.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">💬</div><div>暂无 Session</div></div>';
        return;
      }
      container.innerHTML = currentSessions.map(s => `
        <div class="session-item ${s.sessionId === currentSessionId ? 'active' : ''}" onclick="selectSession('${s.sessionId}')">
          <span class="session-id">${s.sessionId.slice(0, 16)}...</span>
          <div class="session-path">📁 ${s.path}</div>
        </div>
      `).join('');
    }

    // 选择 session
    async function selectSession(sessionId) {
      currentSessionId = sessionId;
      const session = currentSessions.find(s => s.sessionId === sessionId);
      updateChatUI();
      renderSessions();

      if (session) {
        document.getElementById('chatTitle').textContent = `Session: ${sessionId.slice(0, 16)}...`;
        document.getElementById('chatSubtitle').textContent = `📁 ${session.path}`;
        document.getElementById('chatStatus').textContent = '🟢 已连接';
        document.getElementById('messageInput').classList.remove('disabled');
        document.getElementById('sendBtn').classList.remove('disabled');
        document.getElementById('messageInput').placeholder = '输入消息...';

        // 加载历史消息
        await loadSessionDetails(sessionId);
      }

      log(`切换到 Session: ${sessionId.slice(0, 16)}...`, 'info');
    }

    async function loadSessionDetails(sessionId) {
      try {
        // 使用 /sessions/:id/messages 端点加载历史消息（detailed=1 包含工具调用）
        const res = await fetch(`${getApiUrl()}/sessions/${sessionId}/messages?userId=${currentUserId}&detailed=1`);
        if (!res.ok) return;
        const data = await res.json();
        messageHistory = data.messages || [];
        renderMessages();
        log(`加载了 ${messageHistory.length} 条历史消息 (详细模式: ${data.detailed})`, 'success');
      } catch (e) {
        log('加载消息历史失败: ' + e.message, 'error');
      }
    }

    function renderMessages() {
      const container = document.getElementById('chatMessages');
      if (messageHistory.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">💬</div><div>开始对话吧</div></div>';
        return;
      }

      // 过滤掉空消息
      const html = messageHistory.map(m => renderMessageItem(m)).filter(h => h).join('');
      if (!html) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">💬</div><div>暂无对话内容</div></div>';
        return;
      }
      container.innerHTML = html;
      container.scrollTop = container.scrollHeight;
    }

    function renderMessageItem(m) {
      // 过滤掉不需要显示的消息类型
      if (m.type === 'system' || m.type === 'result' || m.type === 'queue-operation') {
        return '';
      }

      // 工具调用 (type: 'tool_use')
      if (m.type === 'tool_use' || (m.type === 'assistant' && m.tool_name)) {
        const inputStr = m.tool_input ? JSON.stringify(m.tool_input, null, 2) : '';
        const lines = inputStr.split('\n').length;
        const needsCollapse = lines > 3;
        return `
          <div class="tool-call">
            <div class="tool-call-name ${needsCollapse ? 'collapsed' : ''}" onclick="toggleToolCollapse(this)">
              <span>🔧 ${m.tool_name || 'tool'}</span>
              ${needsCollapse ? '<span class="expand-icon">▼</span>' : ''}
            </div>
            ${inputStr ? `<div class="tool-call-input ${needsCollapse ? 'collapsed' : 'expanded'}"><pre>${escapeHtml(inputStr)}</pre></div>` : ''}
          </div>
        `;
      }

      // 工具结果 (type: 'tool_result')
      if (m.type === 'tool_result' && m.tool_output !== undefined) {
        const outputStr = typeof m.tool_output === 'string' ? m.tool_output : JSON.stringify(m.tool_output, null, 2);
        const truncated = outputStr.length > 2000 ? outputStr.slice(0, 2000) + '...' : outputStr;
        const lines = truncated.split('\n').length;
        const needsCollapse = lines > 3;
        return `
          <div class="tool-result">
            <div class="tool-call-name ${needsCollapse ? 'collapsed' : ''}" onclick="toggleToolCollapse(this)">
              <span>✅ 工具结果</span>
              ${needsCollapse ? '<span class="expand-icon">▼</span>' : ''}
            </div>
            <div class="tool-call-input ${needsCollapse ? 'collapsed' : 'expanded'}"><pre>${escapeHtml(truncated)}</pre></div>
          </div>
        `;
      }

      // 用户消息 (type: 'user')
      if (m.type === 'user' && m.message?.content) {
        const contentArray = Array.isArray(m.message.content) ? m.message.content : null;

        // 检查是否是 tool_result
        if (contentArray) {
          const toolResult = contentArray.find(c => c.type === 'tool_result');
          if (toolResult) {
            const resultContent = toolResult.content;
            let outputStr = '';
            if (Array.isArray(resultContent)) {
              outputStr = resultContent.map(c => c.text || JSON.stringify(c)).join('\n');
            } else {
              outputStr = typeof resultContent === 'string' ? resultContent : JSON.stringify(resultContent, null, 2);
            }
            const truncated = outputStr.length > 2000 ? outputStr.slice(0, 2000) + '...' : outputStr;
            const lines = truncated.split('\n').length;
            const needsCollapse = lines > 3;
            return `
              <div class="tool-result">
                <div class="tool-call-name ${needsCollapse ? 'collapsed' : ''}" onclick="toggleToolCollapse(this)">
                  <span>✅ 工具结果</span>
                  ${needsCollapse ? '<span class="expand-icon">▼</span>' : ''}
                </div>
                <div class="tool-call-input ${needsCollapse ? 'collapsed' : 'expanded'}"><pre>${escapeHtml(truncated)}</pre></div>
              </div>
            `;
          }
        }

        // 普通用户消息
        const content = typeof m.message.content === 'string'
          ? m.message.content
          : contentArray.map(c => c.text || '').join('');
        return `
          <div class="message message-user">
            <div>${escapeHtml(content)}</div>
            <div class="message-time">${m.timestamp ? new Date(m.timestamp).toLocaleTimeString('zh-CN') : ''}</div>
          </div>
        `;
      }

      // 助手消息 (type: 'assistant') - 可能包含 thinking, text 和 tool_use
      if (m.type === 'assistant' && m.message?.content) {
        const contentArray = Array.isArray(m.message.content) ? m.message.content : [{ type: 'text', text: m.message.content }];

        // 处理 content 数组中的多个部分
        const parts = contentArray.map(c => {
          // thinking 类型
          if (c.type === 'thinking' && c.thinking) {
            const lines = c.thinking.split('\n').length;
            const needsCollapse = lines > 3;
            return `
              <div class="tool-call" style="border-left-color: #a78bfa;">
                <div class="tool-call-name ${needsCollapse ? 'collapsed' : ''}" style="color: #a78bfa;" onclick="toggleToolCollapse(this)">
                  <span>💭 思考过程</span>
                  ${needsCollapse ? '<span class="expand-icon">▼</span>' : ''}
                </div>
                <div class="tool-call-input ${needsCollapse ? 'collapsed' : 'expanded'}"><pre>${escapeHtml(c.thinking)}</pre></div>
              </div>
            `;
          }
          // 文本类型
          if (c.type === 'text' && c.text) {
            return `<div>${escapeHtml(c.text)}</div>`;
          }
          // 工具调用
          if (c.type === 'tool_use' && c.name) {
            const inputStr = c.input ? JSON.stringify(c.input, null, 2) : '';
            const lines = inputStr.split('\n').length;
            const needsCollapse = lines > 3;
            return `
              <div class="tool-call">
                <div class="tool-call-name ${needsCollapse ? 'collapsed' : ''}" onclick="toggleToolCollapse(this)">
                  <span>🔧 ${c.name}</span>
                  ${needsCollapse ? '<span class="expand-icon">▼</span>' : ''}
                </div>
                ${inputStr ? `<div class="tool-call-input ${needsCollapse ? 'collapsed' : 'expanded'}"><pre>${escapeHtml(inputStr)}</pre></div>` : ''}
              </div>
            `;
          }
          return '';
        }).join('');

        // 如果没有内容，跳过
        if (!parts.trim()) return '';

        return `
          <div class="message message-assistant">
            ${parts}
            <div class="message-time">${m.timestamp ? new Date(m.timestamp).toLocaleTimeString('zh-CN') : ''}</div>
          </div>
        `;
      }

      // 兼容简单格式 { role, content, timestamp }
      if (m.role && m.content) {
        return `
          <div class="message message-${m.role}">
            <div>${escapeHtml(m.content)}</div>
            <div class="message-time">${m.timestamp ? new Date(m.timestamp).toLocaleTimeString('zh-CN') : ''}</div>
          </div>
        `;
      }

      // 未知格式，跳过
      return '';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function toggleToolCollapse(headerEl) {
      const inputEl = headerEl.nextElementSibling;
      if (!inputEl) return;

      if (headerEl.classList.contains('collapsed')) {
        headerEl.classList.remove('collapsed');
        inputEl.classList.remove('collapsed');
        inputEl.classList.add('expanded');
      } else {
        headerEl.classList.add('collapsed');
        inputEl.classList.add('collapsed');
        inputEl.classList.remove('expanded');
      }
    }

    function updateChatUI() {
      if (!currentSessionId) {
        document.getElementById('chatTitle').textContent = '选择一个 Session 开始对话';
        document.getElementById('chatSubtitle').textContent = '-';
        document.getElementById('chatStatus').textContent = '未连接';
        document.getElementById('messageInput').classList.add('disabled');
        document.getElementById('sendBtn').classList.add('disabled');
        document.getElementById('messageInput').placeholder = '请先选择或创建一个 Session';
        document.getElementById('chatMessages').innerHTML = '<div class="empty-state"><div class="empty-state-icon">🤖</div><div>选择左侧 Session 开始对话</div></div>';
      }
    }

    // 创建 session
    async function createSession() {
      const workDir = document.getElementById('workDir').value.trim();
      try {
        log('创建 Session...', 'info');
        const body = workDir ? { path: workDir } : {};
        const res = await fetch(`${getApiUrl()}/sessions?userId=${currentUserId}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        if (!res.ok) {
          const err = await res.json();
          if (res.status === 429) {
            alert(`配额不足: ${err.quota?.used}/${err.quota?.max}`);
          }
          throw new Error(err.error || res.status);
        }
        const data = await res.json();
        log(`Session 创建成功: ${data.sessionId.slice(0, 16)}...`, 'success');
        loadSessions();
        selectSession(data.sessionId);
      } catch (e) {
        log('创建 Session 失败: ' + e.message, 'error');
      }
    }

    // 处理发送按钮点击
    function handleSend() {
      if (!currentSessionId) {
        alert('请先选择或创建一个 Session');
        return;
      }
      if (isStreaming) {
        return;
      }
      sendMessage();
    }

    // 发送消息
    async function sendMessage() {
      if (!currentSessionId || isStreaming) return;

      const input = document.getElementById('messageInput');
      const message = input.value.trim();
      if (!message) return;

      // 添加用户消息
      messageHistory.push({
        role: 'user',
        content: message,
        timestamp: new Date().toISOString()
      });
      renderMessages();
      input.value = '';

      isStreaming = true;
      document.getElementById('sendBtn').classList.add('disabled');
      document.getElementById('messageInput').classList.add('disabled');

      // 构建助手消息结构（用于流式更新）
      const assistantMsg = {
        type: 'assistant',
        message: {
          content: []  // 内容数组，包含 text, thinking, tool_use
        },
        timestamp: new Date().toISOString()
      };
      messageHistory.push(assistantMsg);

      // 当前正在构建的内容块
      let currentTextBlock = null;
      let currentThinkingBlock = null;
      let currentToolUse = null;

      // 辅助函数：确保文本块存在
      function ensureTextBlock() {
        if (!currentTextBlock) {
          currentTextBlock = { type: 'text', text: '' };
          assistantMsg.message.content.push(currentTextBlock);
        }
        return currentTextBlock;
      }

      // 辅助函数：完成当前工具调用
      function finishCurrentTool() {
        if (currentToolUse) {
          assistantMsg.message.content.push(currentToolUse);
          currentToolUse = null;
        }
      }

      try {
        const encodedMsg = encodeURIComponent(message);
        const url = `${getApiUrl()}/sessions/${currentSessionId}/stream?userId=${currentUserId}&message=${encodedMsg}`;

        log('开始流式响应...', 'info');
        const eventSource = new EventSource(url);

        eventSource.onmessage = (event) => {
          if (event.data === '[DONE]') {
            eventSource.close();
            isStreaming = false;
            document.getElementById('sendBtn').classList.remove('disabled');
            document.getElementById('messageInput').classList.remove('disabled');
            document.getElementById('messageInput').focus();
            log('响应完成', 'success');
            return;
          }

          try {
            const chunk = JSON.parse(event.data);

            // 处理不同类型的 chunk
            if (chunk.type === 'text' && chunk.content) {
              // 文本内容
              finishCurrentTool();
              ensureTextBlock().text += chunk.content;
              renderMessages();
            }
            else if (chunk.type === 'thinking' && chunk.content) {
              // 思考过程
              finishCurrentTool();
              if (!currentThinkingBlock) {
                currentThinkingBlock = { type: 'thinking', thinking: '' };
                assistantMsg.message.content.push(currentThinkingBlock);
              }
              currentThinkingBlock.thinking += chunk.content;
              renderMessages();
            } else if (chunk.type === 'tool_start') {
              // 工具调用开始
              finishCurrentTool();
              currentTextBlock = null;
              currentThinkingBlock = null;
              // 创建并立即添加到内容中
              currentToolUse = {
                type: 'tool_use',
                id: chunk.toolUseId || `tool_${Date.now()}`,
                name: chunk.toolName,
                input: chunk.toolInput || {}
              };
              assistantMsg.message.content.push(currentToolUse);
              log(`🔧 工具调用: ${chunk.toolName}`, 'warn');
              renderMessages();
            }
            else if (chunk.type === 'tool_end') {
              // 工具调用结束
              currentToolUse = null;
            }
            else if (chunk.type === 'tool_output') {
              // 工具输出 - 作为独立的 tool_result 消息
              finishCurrentTool();
              messageHistory.push({
                type: 'tool_result',
                tool_output: chunk.toolOutput,
                timestamp: new Date().toISOString()
              });
              log(`✅ 工具结果: ${chunk.toolName || 'tool'}`, 'success');
              renderMessages();
            }
          } catch (e) {
            log('解析 chunk 失败: ' + e.message, 'error');
          }
        };

        eventSource.onerror = (err) => {
          eventSource.close();
          isStreaming = false;
          document.getElementById('sendBtn').classList.remove('disabled');
          document.getElementById('messageInput').classList.remove('disabled');
          log('流式连接错误', 'error');
        };

      } catch (e) {
        log('发送消息失败: ' + e.message, 'error');
        isStreaming = false;
        document.getElementById('sendBtn').classList.remove('disabled');
        document.getElementById('messageInput').classList.remove('disabled');
      }
    }

    // 删除当前 session
    async function deleteCurrentSession() {
      if (!currentSessionId) {
        alert('请先选择 Session');
        return;
      }

      try {
        const res = await fetch(`${getApiUrl()}/sessions/${currentSessionId}?userId=${currentUserId}`, {
          method: 'DELETE'
        });
        if (!res.ok) throw new Error('删除失败');
        log('Session 已删除', 'success');
        currentSessionId = null;
        messageHistory = [];
        updateChatUI();
        loadSessions();
      } catch (e) {
        log('删除失败: ' + e.message, 'error');
      }
    }

    function refreshAll() {
      loadUsers();
      loadSessions();
      if (currentSessionId) {
        loadSessionDetails(currentSessionId);
      }
    }

    function clearLogs() {
      document.getElementById('logContent').innerHTML = '<div class="log-entry"><span class="log-time">--:--:--</span>日志已清空</div>';
    }

    // 清空当前用户的所有 Sessions
    async function clearAllSessions() {
      if (!currentUserId) {
        alert('请先设置用户ID');
        return;
      }

      log(`开始清空用户 ${currentUserId} 的所有 Sessions...`, 'warn');

      try {
        // 关闭当前 EventSource
        if (currentSessionId) {
          currentSessionId = null;
          messageHistory = [];
          updateChatUI();
        }

        // 获取当前用户的所有 Sessions
        const res = await fetch(`${getApiUrl()}/sessions?userId=${currentUserId}`);
        if (!res.ok) throw new Error('获取 Sessions 失败');

        const data = await res.json();
        const sessions = data.sessions || [];

        if (sessions.length === 0) {
          log('该用户没有 Sessions', 'info');
          return;
        }

        log(`找到 ${sessions.length} 个 Sessions，开始删除...`, 'info');

        // 逐个删除
        let successCount = 0;
        let failCount = 0;
        for (const session of sessions) {
          try {
            const deleteRes = await fetch(`${getApiUrl()}/sessions/${session.sessionId}?userId=${currentUserId}`, {
              method: 'DELETE'
            });
            if (deleteRes.ok) {
              successCount++;
              log(`已删除: ${session.sessionId.slice(0, 16)}...`, 'success');
            } else {
              failCount++;
              log(`删除失败: ${session.sessionId.slice(0, 16)}...`, 'error');
            }
          } catch (e) {
            failCount++;
            log(`删除异常: ${session.sessionId.slice(0, 16)}... - ${e.message}`, 'error');
          }
        }

        log(`清空完成: 成功 ${successCount} 个, 失败 ${failCount} 个`, successCount > 0 ? 'success' : 'error');
        loadSessions();
      } catch (e) {
        log('清空 Sessions 失败: ' + e.message, 'error');
      }
    }

    // 回车发送
    document.getElementById('messageInput')?.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        handleSend();
      }
    });

    // 初始化
    window.onload = () => {
      loadUsers();
      loadSessions();
    };
  </script>
</body>

</html>
